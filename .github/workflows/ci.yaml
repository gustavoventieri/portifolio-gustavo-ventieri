name: CI Pipeline

on:
  push:
    branches:
      - master
      - dev

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run EsLint
        run: pnpm run lint

      - name: Run Build Test
        run: pnpm run build
